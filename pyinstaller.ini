# Configuration PyInstaller pour Chambre Froide
# Ce fichier peut être utilisé avec pyinstaller --load-config-file pyinstaller.ini

[MAIN]
script = main.py
name = ChambreFroide
version = 1.0.0
author = Chambre Froide Team
icon = images\favicon.ico

[BUILD]
onedir = false
onefile = true
windowed = true
clean = true
upx = true

[DATA]
images = images
base_des_donnees = base_des_donnees

[HIDDEN_IMPORTS]
PySide6.QtCore
PySide6.QtGui
PySide6.QtWidgets
pymysql
bcrypt
reportlab
reportlab.lib
reportlab.lib.pagesizes
reportlab.lib.colors
reportlab.lib.units
reportlab.platypus
reportlab.lib.styles
PIL
PIL.Image
PIL.ImageDraw
PIL.ImageFont
win32print
win32ui
PIL.ImageWin
datetime
os
sys
decimal
hashlib

[EXCLUDES]
tkinter
matplotlib
numpy
scipy
pandas
jupyter
notebook
ipython
ipykernel
qtconsole
spyder
pyqt5
pyqt6